<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #222;
      }
      .header {
        margin: 20px auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
      }
      .tt {
        background-color: #d7efff;
        border: none;
        border-radius: 10px;
        padding: 10px;
        width: 500px;
        color: #261f50;
        margin: 10px 0;
      }
      button {
        width: 500px;
        height: 30px;
        border: none;
        background-color: #9dc8ff;
        border-radius: 10px;
        margin-top: 20px;
      }
      .delete-button {
        background-color: transparent;
        margin: 10px;

        text-align: center;
        width: 30px;
        height: 5px;
      }

      .container {
        display: flex;
        justify-content: center;
        align-content: center;
      }

      .box {
        width: 400px;
        min-height: 800px;
        border: 2px solid #4e31b8;
        border-radius: 15px;

        margin: 50px 40px;
        background-color: #d9eaff;
      }
      .txt {
        color: #224370;
        font-size: 1.5rem;
        font-weight: bold;
        text-align: center;
        height: 10px;
        position: relative;
        margin-top: 20px;
        margin-bottom: 50px;
      }

      p {
        margin: 15px 5px 5px 9px;
        padding: 15px 20px;
        width: 96%;
        min-height: 50px;
        overflow-wrap: break-word;
        border-radius: 8px;
        position: relative;
      }

      .todo-card {
        border-radius: 5px;
        padding: 20px;
        margin: 10px 10px;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <section class="header">
      <input class="tt" id="title" placeholder="Title" />
      <textarea
        class="tt"
        id="content"
        cols="40"
        rows="4"
        placeholder="Content"
      ></textarea>
      <input class="tt" id="url" type="url" placeholder="URL" />

      <button>Click</button>
    </section>
    <section class="container">
      <div class="box todo" category="todo">
        <div class="txt">ToDo</div>
      </div>

      <div class="box doing" category="doing">
        <div class="txt">Doing</div>
      </div>

      <div class="box done" category="done">
        <div class="txt">Done</div>
      </div>
    </section>
    <script src="todo_2.js"></script>
  </body>
</html>
